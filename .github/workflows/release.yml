name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.3.0) — dry-run only, no upload"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            # x86_64: informational only, no size gate
            minimal_budget_bytes: 0
            minimal_soft_gate: true
          - target: aarch64-unknown-linux-musl
            # aarch64: hard gate — release fails if minimal binary exceeds 8 MiB
            minimal_budget_bytes: 8388608
            minimal_soft_gate: false
          # mipsel-unknown-linux-musl: temporarily disabled — `rust-std` is no
          # longer published for this target on stable. Re-enable when stable
          # ships the component again, or when ADR-0007 §1 promotes it to a
          # nightly/build-std path. Tracked separately from ADR-0007.
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: release-${{ matrix.target }}

      - name: Install cargo-zigbuild and zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - run: cargo install --locked cargo-zigbuild

      - name: Build release binary (static musl, default features)
        run: cargo zigbuild --release --locked --target ${{ matrix.target }} --bin meow

      - name: Build minimal release binary (stripped, for size check)
        if: matrix.minimal_budget_bytes != 0
        run: |
          cargo zigbuild --release --locked \
            --no-default-features --features minimal \
            --target ${{ matrix.target }} \
            --bin meow
          # Copy minimal binary aside before default binary overwrites artifact.
          # Binary is already stripped via [profile.release] strip = true in
          # the workspace Cargo.toml — no post-build strip needed (and the
          # host `strip` cannot read aarch64 ELF anyway).
          cp "target/${{ matrix.target }}/release/meow" \
             "target/${{ matrix.target }}/release/meow-minimal"

      - name: Minimal binary size check
        if: matrix.minimal_budget_bytes != 0
        run: |
          SIZE=$(stat -c%s "target/${{ matrix.target }}/release/meow-minimal")
          BUDGET=${{ matrix.minimal_budget_bytes }}
          echo "Minimal binary size: ${SIZE} bytes (budget: ${BUDGET} bytes)"
          if [ "${SIZE}" -gt "${BUDGET}" ]; then
            if [ "${{ matrix.minimal_soft_gate }}" = "true" ]; then
              echo "::warning::${{ matrix.target }} minimal binary ${SIZE} bytes exceeds soft budget ${BUDGET} bytes (ADR-0007 §1)"
            else
              echo "::error::${{ matrix.target }} minimal binary ${SIZE} bytes exceeds hard budget ${BUDGET} bytes (ADR-0007 §2)"
              exit 1
            fi
          else
            echo "Size check passed: ${SIZE} <= ${BUDGET}"
          fi

      - name: Package tarball
        id: pkg
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          name="meow-${ref}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/meow" "${staging}/"
          cp README.md LICENSE "${staging}/" 2>/dev/null || true
          tar -C dist -czf "${name}.tar.gz" "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meow-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.checksum }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
