# meow-rs sample configuration

# Inbound listeners
mixed-port: 7890
# port: 7891        # HTTP proxy port (optional, mixed-port covers both)
# socks-port: 7892  # SOCKS5 port (optional, mixed-port covers both)

# Transparent proxy (requires root/sudo for firewall rules)
# tproxy-port: 7893      # Enable transparent proxy on this port
# tproxy-sni: true       # Extract SNI from TLS ClientHello (default: true)
# routing-mark: 9527     # SO_MARK for DIRECT loop avoidance on Linux

allow-lan: false
bind-address: "127.0.0.1"
mode: rule
log-level: info
ipv6: false

# REST API
external-controller: 127.0.0.1:9090
secret: ""

# DNS
dns:
  enable: true
  listen: 127.0.0.1:1053
  nameserver:
    - 8.8.8.8
    - 1.1.1.1
  fallback:
    - 8.8.4.4
    - 1.0.0.1

# Proxies
proxies:
  - name: "ss-example"
    type: ss
    server: 1.2.3.4
    port: 8388
    cipher: aes-256-gcm
    password: "your-password"
    udp: true

  # Built-in simple-obfs plugin (no external `obfs-local` / `simple-obfs`
  # binary required). Set `plugin: obfs` and pick `mode: http` or `mode: tls`.
  # - name: "ss-obfs-example"
  #   type: ss
  #   server: 1.2.3.4
  #   port: 8388
  #   cipher: aes-256-gcm
  #   password: "your-password"
  #   udp: true
  #   plugin: obfs
  #   plugin-opts:
  #     mode: http
  #     host: bing.com

  - name: "trojan-example"
    type: trojan
    server: 5.6.7.8
    port: 443
    password: "your-password"
    sni: example.com
    skip-cert-verify: false
    udp: true

# Proxy groups
proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - ss-example
      - trojan-example
      - DIRECT

  - name: "Auto"
    type: url-test
    proxies:
      - ss-example
      - trojan-example
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: "Fallback"
    type: fallback
    proxies:
      - ss-example
      - trojan-example

# Rules
rules:
  # Direct
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-KEYWORD,localhost,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve

  # Common proxy rules
  - DOMAIN-SUFFIX,google.com,Proxy
  - DOMAIN-SUFFIX,youtube.com,Proxy
  - DOMAIN-SUFFIX,github.com,Proxy
  - DOMAIN-KEYWORD,twitter,Proxy
  - DOMAIN-KEYWORD,facebook,Proxy

  # Ports
  - DST-PORT,22,DIRECT
  - SRC-PORT,7777,DIRECT

  # Network
  - NETWORK,udp,DIRECT

  # Process
  - PROCESS-NAME,curl,DIRECT

  # Final fallback
  - MATCH,Proxy
